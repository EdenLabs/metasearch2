# --- Low quality tech tutorial sites ---
[block.tutorial_farms]
domains = [
    "tutorialspoint.com", "javatpoint.com", "guru99.com",
]

[lower.tutorial_mixed]
domains = [
    "w3schools.com", "geeksforgeeks.org", "programiz.com",
    "baeldung.com", "freecodecamp.org",
]

# --- Affiliate / comparison spam ---
[block.affiliate]
domains = [
    "bestreviews.com", "top10.com", "slant.co", "versus.com",
    "techjury.net",
]

[lower.affiliate]
domains = [
    "forbes.com", "nerdwallet.com", "wirecutter.com",
    "g2.com", "capterra.com", "trustpilot.com",
]

# --- AI-generated content farms ---
[block.ai_slop]
domains = [
    "aitoolsarena.com", "toolify.ai", "futurepedia.io",
    "theresanaiforthat.com", "writesonic.com", "copy.ai",
    "jasper.ai",
]
# NOTE: For comprehensive AI slop blocking (1000+ domains), fetch:
# https://github.com/laylavish/uBlockOrigin-HUGE-AI-Blocklist

# --- Blogging platforms: lower by default, quality varies ---
