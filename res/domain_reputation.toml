[block.ziff_davis]
domains = [
    "lifehacker.com", "mashable.com", "askmen.com", "retailmenot.com",
]

[block.healthline_media]
domains = [
    "healthline.com", "medicalnewstoday.com", "greatist.com",
    "psychcentral.com",
]

[block.misc_content_farms]
