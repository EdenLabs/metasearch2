# ============================================================================
# Domain Reputation - TOML Config
# ============================================================================
# Drop this into your ranking system. Weights are multiplicative:
#   0.0 = blocked (never show)
#   0.3 = lowered (deprioritize)
#   1.0 = neutral (default for unlisted domains)
#   1.5 = raised (boost)
#   2.0 = pinned (strong boost)
#
# TO EXPAND THIS LIST, fetch comprehensive blocklists:
#
#   Super-SEO-Spam-Suppressor (2700+ domains, multiple formats):
#     git clone https://github.com/NotaInutilis/Super-SEO-Spam-Suppressor
#     # Files: ublacklist.txt, hosts.txt, adblock.txt
#     # Parse ublacklist.txt: lines starting with *:// are domain patterns
#     # Extract with: grep -oP '\*://\K[^/]+' ublacklist.txt | sort -u
#
#   awesome-ublacklist (meta-list of all major blocklists):
#     https://github.com/rjaus/awesome-ublacklist
#
#   AI content farm blocklist (1000+ domains):
#     git clone https://github.com/laylavish/uBlockOrigin-HUGE-AI-Blocklist
#
#   Kagi leaderboard (live data, ~200 domains):
#     Visit https://kagi.com/stats?stat=leaderboard
#     JS-rendered, scrape with browser devtools:
#       JSON.stringify([...document.querySelectorAll('.domain-row')]
#         .map(r => ({domain: r.querySelector('.domain').textContent,
#                     action: r.querySelector('.action').textContent})))
#
#   Convert uBlacklist format to flat domain list:
#     grep -oP '\*://\*?\.\K[^/*]+' ublacklist.txt | sort -u > domains.txt
#
#   Convert hosts file format to flat domain list:
#     grep '^0.0.0.0' hosts.txt | awk '{print $2}' | sort -u > domains.txt
# ============================================================================

# --- Social noise: block or heavily lower ---
[block.social]
domains = [
    "pinterest.com", "pinterest.co.uk", "pinterest.fr", "pinterest.de",
    "pinterest.ca", "pinterest.com.au", "pinterest.it", "pinterest.es",
    "pinterest.jp", "pinterest.ch", "pinterest.at", "pinterest.se",
    "pinterest.pt", "pinterest.dk", "pinterest.ph", "pinterest.nz",
    "quora.com", "facebook.com", "instagram.com", "tiktok.com",
]

[lower.social]
domains = [
    "twitter.com", "x.com", "linkedin.com",
]

# --- Content farm conglomerates ---
[block.dotdash_meredith]
domains = [
    "dotdash.com", "dotdashmeredith.com", "aboutdotcom.com",
    "byrdie.com", "thespruce.com", "thespruceeats.com",
    "thesprucecrafts.com", "thesprucepets.com", "thebalancemoney.com",
    "verywellhealth.com", "verywellmind.com", "verywellfit.com",
    "simplyrecipes.com", "liveabout.com", "treehugger.com",
    "thoughtco.com", "tripsavvy.com", "brides.com", "liquor.com",
]

[block.valnet]
domains = [
    "makeuseof.com", "screenrant.com", "gamerant.com", "cbr.com",
    "therecipe.com", "thegamer.com", "thetravel.com", "movieweb.com",
]

[lower.valnet_formerly_good]
